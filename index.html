    // ================================================================
    // 3. 辅助工具：随机时间、生成帖子
    // ================================================================
    const TIME_OPTIONS = [
        "刚刚", "2分钟前", "8分钟前", "15分钟前", "半小时前", "1小时前", "2小时前", "3小时前",
        "昨天 07:23", "昨天 10:15", "昨天 12:00", "昨天 14:40", "昨天 19:08",
        "前天 08:30", "前天 12:00", "前天 21:17"
    ];

    function getRandomTime() {
        return TIME_OPTIONS[Math.floor(Math.random() * TIME_OPTIONS.length)];
    }

    // 根据角色键名和变体生成完整帖子对象（包含评论）
    function getRandomPostForCharacter(charKey) {
        const variants = POST_VARIANTS[charKey];
        if (!variants || variants.length === 0) {
            return {
                userName: CHARACTERS[charKey]?.userName || "未知",
                avatarType: "image",
                avatarUrl: CHARACTERS[charKey]?.avatarUrl || "",
                content: "暂无动态",
                time: getRandomTime(),
                imageUrl: "",
                alt: "",
                comments: []
            };
        }
        const randomIndex = Math.floor(Math.random() * variants.length);
        const variant = variants[randomIndex];
        const char = CHARACTERS[charKey];
        return {
            userName: char.userName,
            avatarType: "image",
            avatarUrl: char.avatarUrl,
            content: variant.content,
            time: getRandomTime(),
            imageUrl: variant.imageUrl || "",
            alt: variant.alt || "",
            comments: variant.comments || []   // 评论数组
        };
    }

    // 生成朋友圈列表（固定10条，角色从所有角色中随机抽取，去重保证内容不重复）
    let lastUsedFingerprints = new Set();
    
    function generateFeedList(count) {
        // 构建全量池
        const allPosts = [];
        for (const [charKey, variants] of Object.entries(POST_VARIANTS)) {
            const char = CHARACTERS[charKey];
            if (!char) continue;
            for (const variant of variants) {
                allPosts.push({
                    userName: char.userName,
                    avatarType: "image",
                    avatarUrl: char.avatarUrl,
                    content: variant.content || "",
                    imageUrl: variant.imageUrl || "",
                    alt: variant.alt || "",
                    comments: variant.comments || []
                });
            }
        }
    
        if (allPosts.length === 0) {
            // 如果池子为空，返回空数组
            return [];
        }
    
        function getFingerprint(post) {
            return (post.content || '') + '|||' + (post.imageUrl || '');
        }
    
        // 过滤掉上次使用的
        let available = allPosts;
        if (lastUsedFingerprints.size > 0) {
            available = allPosts.filter(post => !lastUsedFingerprints.has(getFingerprint(post)));
        }
    
        // 如果过滤后不足，则全部使用
        if (available.length < count) {
            available = allPosts;
        }
    
        // 打乱
        for (let i = available.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [available[i], available[j]] = [available[j], available[i]];
        }
    
        const selected = available.slice(0, count);
    
        // 更新指纹
        const newFingerprints = new Set();
        for (const post of selected) {
            newFingerprints.add(getFingerprint(post));
        }
        lastUsedFingerprints = newFingerprints;
    
        // 分配时间
        for (const post of selected) {
            post.time = getRandomTime();
        }
    
        return selected;
    }

    // ================================================================
    // 4. DOM 操作与渲染
    // ================================================================
    const feedListEl = document.getElementById('feedList');
    const refreshIndicator = document.getElementById('refreshIndicator');
    const refreshTextSpan = document.getElementById('refreshText');
    const toastMsg = document.getElementById('toastMsg');

    let isRefreshing = false;
	let isLoadingMore = false;      // ← 新增
	let refreshCooldown = false;    // ← 新增
    let refreshReady = false;
    let isPullActive = false;
    let startY = 0;
    let startScrollTop = 0;
    let isTouchMoving = false;
    const PULL_THRESHOLD = 55;
    const MAX_PULL_HEIGHT = 70;
    const DISPLAY_COUNT = 10;

    function showToast(text, duration = 1500) {
        if (!toastMsg) return;
        toastMsg.innerText = text;
        toastMsg.classList.add('show');
        setTimeout(() => toastMsg.classList.remove('show'), duration);
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // 渲染朋友圈列表（包含评论区）
    function renderFeeds(feedsArray) {
        if (!feedListEl) return;
        if (!feedsArray || feedsArray.length === 0) {
            feedListEl.innerHTML = '<div class="empty-tip">暂时没有动态</div>';
            return;
        }
        let html = '';
        for (const feed of feedsArray) {
            // 头像
            let avatarHtml = `<img src="${feed.avatarUrl}" alt="avatar">`;

            // 配图
            const imageHtml = feed.imageUrl ? `
                <div class="feed-image">
                    <img src="${feed.imageUrl}" alt="${escapeHtml(feed.alt)}" loading="lazy">
                </div>
            ` : '';

            // ---------- 评论区 HTML ----------
            let commentsHtml = '';
            if (feed.comments && feed.comments.length > 0) {
                const commentItems = feed.comments.map(comment => {
                    let replyPart = comment.replyTo ? ` 回复了 <span class="comment-reply-to">${escapeHtml(comment.replyTo)}</span>：` : '：';
                    // 先转义整个文本
                    let text = escapeHtml(comment.text);
                    // 再替换表情标记（注意这里替换后插入的 img 标签不会被转义）
                    text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, function(match, name, url) {
                        // 这里的 name 和 url 已经由 escapeHtml 处理过了，但我们需要再次确保安全
                        // 因为 name 和 url 来自原始文本，已被转义，但我们要构造 img，需要解码？实际上 escapeHtml 会将 & 转为 &amp; 等，所以最好先 unescape？
                        // 更简单的方法：只对 URL 进行转义，name 也转义
                        const safeName = escapeHtml(name);
                        const safeUrl = escapeHtml(url);
                        return `<img src="${safeUrl}" alt="${safeName}" class="comment-emoji">`;
                    });
                    return `
                        <div class="comment-item">
                            <span class="comment-user">${escapeHtml(comment.user)}</span>
                            ${replyPart}
                            <span class="comment-text">“${text}”</span>
                        </div>
                    `;
                }).join('');
                commentsHtml = `
                    <div class="comments-section">
                        ${commentItems}
                    </div>
                `;
            }

            // 整条卡片
            html += `
                <div class="feed-card">
                    <div class="feed-wrapper">
                        <div class="avatar">${avatarHtml}</div>
                        <div class="feed-content">
                            <div class="user-info">
                                <span class="username">${escapeHtml(feed.userName)}</span>
                                <span class="time">${escapeHtml(feed.time)}</span>
                            </div>
                            <div class="text-content">${escapeHtml(feed.content).replace(/\n/g, '<br>')}</div>
                            ${imageHtml}
                            ${commentsHtml}
                        </div>
                    </div>
                </div>
            `;
        }
        feedListEl.innerHTML = html;
    }

    // 刷新内容：生成新的随机列表并渲染
    function refreshContent() {
        const newFeeds = generateFeedList(DISPLAY_COUNT);
        renderFeeds(newFeeds);
        showToast('刷新成功', 1200);
    }

    // ================================================================
    // 5. 下拉刷新逻辑（触摸 + 鼠标）
    // ================================================================
    function performRefresh() {
        if (isRefreshing) return Promise.resolve();
        isRefreshing = true;
        if (refreshTextSpan && refreshIndicator) {
            refreshTextSpan.innerHTML = '<span class="refresh-spinner"></span> 刷新中...';
            refreshIndicator.style.height = '44px';
        }
        return new Promise((resolve) => {
            setTimeout(() => {
                refreshContent();
                resetRefreshIndicator();
                isRefreshing = false;
                resolve();
            }, 500);
        }).catch(() => {
            resetRefreshIndicator();
            isRefreshing = false;
            showToast('请检查『虚空终端』连接情况', 1200);
        });
    }

    function resetRefreshIndicator() {
        if (refreshIndicator) refreshIndicator.style.height = '0px';
        if (refreshTextSpan) refreshTextSpan.innerHTML = '下拉刷新';
        refreshReady = false;
        isPullActive = false;
    }

    function updatePullProgress(distance) {
        if (isRefreshing) return;
        let pullDist = Math.min(distance, MAX_PULL_HEIGHT);
        if (pullDist <= 0) {
            refreshIndicator.style.height = '0px';
            return;
        }
        refreshIndicator.style.height = pullDist + 'px';
        if (pullDist >= PULL_THRESHOLD) {
            if (!refreshReady) {
                refreshReady = true;
                refreshTextSpan.innerHTML = '⬇️ 释放刷新';
            }
        } else {
            if (refreshReady) refreshReady = false;
            refreshTextSpan.innerHTML = '⬇️ 下拉刷新';
        }
    }

    // ----- 触摸事件 -----
    function onTouchStart(e) {
        if (isRefreshing) return;
        const touch = e.touches[0];
        startY = touch.clientY;
        startScrollTop = window.pageYOffset || document.documentElement.scrollTop || 0;
        isTouchMoving = false;
    }

    function onTouchMove(e) {
        if (isRefreshing) return;
        if (!startY) return;
        const touch = e.touches[0];
        const deltaY = touch.clientY - startY;
        const currentScrollTop = window.pageYOffset || document.documentElement.scrollTop || 0;
        if (currentScrollTop === 0 && deltaY > 0) {
            e.preventDefault();
            isTouchMoving = true;
            let pullDistance = Math.min(deltaY, MAX_PULL_HEIGHT + 8);
            updatePullProgress(pullDistance);
            isPullActive = true;
        } else {
            if (isPullActive) {
                resetRefreshIndicator();
                isPullActive = false;
            }
        }
    }

    function onTouchEnd(e) {
        if (isRefreshing) {
            if (isPullActive) resetRefreshIndicator();
            startY = 0;
            isPullActive = false;
            return;
        }
        if (refreshReady && !isRefreshing) {
            performRefresh().then(() => {
                resetRefreshIndicator();
                startY = 0;
                isPullActive = false;
                refreshReady = false;
            });
        } else {
            if (refreshIndicator && refreshIndicator.style.height !== '0px') resetRefreshIndicator();
            refreshReady = false;
            isPullActive = false;
        }
        startY = 0;
        isTouchMoving = false;
    }

    // ----- 鼠标事件（PC 支持） -----
    let mouseStartY = 0;
    let mouseDragging = false;
    function onMouseDown(e) {
        if (isRefreshing) return;
        mouseStartY = e.clientY;
        mouseDragging = true;
    }
    function onMouseMove(e) {
        if (!mouseDragging || isRefreshing) return;
        const deltaY = e.clientY - mouseStartY;
        const currentScrollTop = window.pageYOffset || document.documentElement.scrollTop || 0;
        if (currentScrollTop === 0 && deltaY > 0 && !isRefreshing) {
            let pullDist = Math.min(deltaY, MAX_PULL_HEIGHT);
            updatePullProgress(pullDist);
            if (pullDist >= PULL_THRESHOLD && !refreshReady) {
                refreshReady = true;
                refreshTextSpan.innerHTML = '⬇️ 释放刷新';
            } else if (pullDist < PULL_THRESHOLD && refreshReady) {
                refreshReady = false;
                refreshTextSpan.innerHTML = '⬇️ 下拉刷新';
            }
            isPullActive = true;
        } else {
            if (isPullActive && currentScrollTop !== 0) {
                resetRefreshIndicator();
                isPullActive = false;
            }
        }
    }
    function onMouseUp(e) {
        if (!mouseDragging) return;
        if (refreshReady && !isRefreshing && isPullActive) {
            performRefresh().then(() => {
                resetRefreshIndicator();
                refreshReady = false;
                isPullActive = false;
            });
        } else {
            if (refreshIndicator && refreshIndicator.style.height !== '0px') resetRefreshIndicator();
            refreshReady = false;
            isPullActive = false;
        }
        mouseDragging = false;
    }

    function bindEvents() {
        document.addEventListener('touchstart', onTouchStart, { passive: false });
        document.addEventListener('touchmove', onTouchMove, { passive: false });
        document.addEventListener('touchend', onTouchEnd);
        document.addEventListener('mousedown', onMouseDown);
        document.addEventListener('mousemove', onMouseMove);
        document.addEventListener('mouseup', onMouseUp);
        window.addEventListener('scroll', () => {
            if (isRefreshing) return;
            const scrollTop = window.pageYOffset || document.documentElement.scrollTop || 0;
            if (scrollTop !== 0 && isPullActive) {
                resetRefreshIndicator();
                isPullActive = false;
                refreshReady = false;
            }
        });
    }

    // ================================================================
    // 6. 初始化
    // ================================================================
    function init() {
        const initialFeeds = generateFeedList(DISPLAY_COUNT);
        renderFeeds(initialFeeds);
        bindEvents();
        resetRefreshIndicator();
        isRefreshing = false;
    }
    init();
</script>
</body>
</html>
